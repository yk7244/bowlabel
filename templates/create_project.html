{% extends "base.html" %}
{% block title %}새 프로젝트{% endblock %}
{% block content %}
<div class="page-header">
  <h2>새 프로젝트</h2>
  <a href="{{ url_for('admin_dashboard') }}" class="btn-secondary">←</a>
</div>
<div class="form-card">
  <form method="post">
    <div class="form-group">
      <label>이름 *</label>
      <input type="text" name="name" placeholder="violin_bowing_keypoints_v001" required>
    </div>
    <div class="form-group">
      <label>설명</label>
      <input type="text" name="description" placeholder="세션 메모">
    </div>
    <div class="form-group">
      <label>Class: <code>{{ class_name }}</code> · 9 core keypoints (+3 optional)</label>
      <div class="schema-preview" style="margin:10px 0">
        {% for kp in schema_preview %}
        <span class="schema-kp" title="{{ kp.desc }}" {% if kp.optional %}style="opacity:.6"{% endif %}>
          <span class="schema-kp-dot" style="background:{{ kp.color }}"></span>
          {{ kp.label }}{% if kp.optional %} (opt){% endif %}
        </span>
        {% endfor %}
      </div>
      <textarea name="keypoint_schema" rows="18" class="code-editor">{{ default_schema }}</textarea>
    </div>
    <button type="submit" class="btn-primary">생성</button>
  </form>
</div>
{% endblock %}
