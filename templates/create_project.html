{% extends "base.html" %}
{% block title %}새 프로젝트 - BowLabel{% endblock %}
{% block content %}
<div class="page-header">
  <h2>새 프로젝트 만들기</h2>
  <a href="{{ url_for('admin_dashboard') }}" class="btn-secondary">← 뒤로</a>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-group">
      <label>프로젝트 이름 *</label>
      <input type="text" name="name" placeholder="예: Violin Bow Stroke v1" required>
    </div>
    <div class="form-group">
      <label>설명</label>
      <input type="text" name="description" placeholder="예: 다운보우/업보우 분류용 데이터셋">
    </div>
    <div class="form-group">
      <label>키포인트 스키마 (JSON) — 기본값: 바이올린 활쓰기 19개</label>
      <textarea name="keypoint_schema" rows="20" class="code-editor">{{ default_schema }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">프로젝트 생성</button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn-secondary">취소</a>
    </div>
  </form>
</div>
{% endblock %}
