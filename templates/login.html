{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-hero">
    <h1><em>violin_bowing_scene</em><br>9 keypoints</h1>
    <p>프레임마다 bbox + 9점 전부.<br>Pilot agreement → Main 라벨링.</p>
  </div>
  <div class="login-side">
    <div class="login-box">
      <h2>BowLabel v3</h2>
      <p class="login-sub">내부 라벨링</p>
      {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
      <form method="post">
        <div class="form-group"><label>아이디</label><input type="text" name="username" required autofocus></div>
        <div class="form-group"><label>비밀번호</label><input type="password" name="password" required></div>
        <button type="submit" class="btn-primary full-width">로그인</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
